[tool.ruff]
line-length = 100
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.black]
line-length = 100

[tool.isort]
profile = "black"
line_length = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["app"]
omit = [
    "tests/*",
    "app/db/session.py",
    "app/db/base.py",
    "app/dependencies.py",
    "app/routers/health.py",
]

[tool.coverage.report]
show_missing = true
fail_under = 80

